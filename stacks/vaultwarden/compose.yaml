services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=https://vaultwarden.mattmiranda.dev
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - vaultwarden_data:/data
    networks:
      - basestation_net

volumes:
  vaultwarden_data:

networks:
  basestation_net:
    external: true